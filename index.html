<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portail Central</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--gold:#e8b84b;
--gold2:#c49030;
--blue:#60a5fa;
--blue2:#2563eb;
}

body{
font-family:'Inter',sans-serif;
overflow:hidden;
height:100vh;

background:
radial-gradient(circle at top,
#2a1c0b 0%,
#120c05 35%,
#090603 100%);

color:white;
position:relative;
}

/* ========================= */
/* PARTICULES */
/* ========================= */

.particles{
position:absolute;
inset:0;
overflow:hidden;
pointer-events:none;
}

.particle{
position:absolute;
background:rgba(232,184,75,.15);
border-radius:50%;
animation:float linear infinite;
}

@keyframes float{

0%{
transform:translateY(100vh);
opacity:0;
}

10%{
opacity:1;
}

90%{
opacity:.5;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

/* ========================= */
/* KANJI */
/* ========================= */

.bg-kanji{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);

font-size:300px;

font-family:'Cinzel',serif;

color:rgba(232,184,75,.05);

pointer-events:none;
user-select:none;
}

/* ========================= */
/* HERO */
/* ========================= */

.hero{

position:relative;
z-index:5;

height:100vh;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.subtitle{

font-family:'Cinzel',serif;

letter-spacing:.5em;

font-size:12px;

color:#8d6f2d;

margin-bottom:20px;
}

.title{

font-family:'Cinzel',serif;

font-size:70px;

letter-spacing:.25em;

margin-bottom:15px;

text-align:center;
}

.line{

width:300px;
height:1px;

background:
linear-gradient(
90deg,
transparent,
var(--gold),
transparent
);

margin:20px 0;
}

.desc{

color:#9d8760;

font-size:15px;

margin-bottom:60px;

letter-spacing:.08em;
}

/* ========================= */
/* CARDS */
/* ========================= */

.cards{

display:flex;

gap:40px;

flex-wrap:wrap;

justify-content:center;
}

.card{

position:relative;

width:420px;
height:260px;

border-radius:18px;

overflow:hidden;

text-decoration:none;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

transition:.4s;

backdrop-filter:blur(10px);
}

.card:hover{

transform:translateY(-10px);
}

/* SHUGO */

.shugo{

background:
linear-gradient(
145deg,
rgba(232,184,75,.08),
rgba(20,15,8,.95)
);

border:1px solid rgba(232,184,75,.3);
}

.shugo:hover{

box-shadow:
0 0 50px rgba(232,184,75,.25);
}

/* KODOMO */

.kodomo{

background:
linear-gradient(
145deg,
rgba(96,165,250,.08),
rgba(10,15,30,.95)
);

border:1px solid rgba(96,165,250,.3);
}

.kodomo:hover{

box-shadow:
0 0 50px rgba(96,165,250,.25);
}

.card-kanji{

position:absolute;

font-size:170px;

opacity:.08;

top:50%;
left:50%;

transform:translate(-50%,-50%);

font-family:'Cinzel',serif;
}

.shugo .card-kanji{
color:var(--gold);
}

.kodomo .card-kanji{
color:var(--blue);
}

.card-title{

font-family:'Cinzel',serif;

font-size:38px;

letter-spacing:.25em;

z-index:2;
}

.shugo .card-title{
color:var(--gold);
}

.kodomo .card-title{
color:var(--blue);
}

.card-sub{

margin-top:10px;

font-size:14px;

letter-spacing:.15em;

color:#b5a98f;

z-index:2;
}

/* ========================= */
/* FOOTER */
/* ========================= */

.footer{

position:absolute;

bottom:25px;

left:50%;

transform:translateX(-50%);

font-family:'Cinzel',serif;

font-size:11px;

letter-spacing:.35em;

color:#735d2f;
}

@media(max-width:1000px){

.cards{
flex-direction:column;
}

.card{
width:90vw;
max-width:420px;
}

.title{
font-size:45px;
}

}

</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="bg-kanji">
砂
</div>

<div class="hero">

<div class="subtitle">
SYSTÈME CENTRAL
</div>

<div class="line"></div>

<div class="title">
PORTAIL DE SUNA
</div>

<div class="line"></div>

<div class="desc">
Choisissez une section pour accéder aux services du village.
</div>

<div class="cards">

<a href="shugo/index.html" class="card shugo">

<div class="card-kanji">
砂
</div>

<div class="card-title">
SHUGO
</div>

<div class="card-sub">
Archives judiciaires
</div>

</a>

<a href="kodomo/index.html" class="card kodomo">

<div class="card-kanji">
水
</div>

<div class="card-title">
KODOMO
</div>

<div class="card-sub">
Section Kodomo
</div>

</a>

</div>

</div>

<div class="footer">
SUNAGAKURE NO SATO • PORTAIL CENTRAL
</div>

<script>

const particles=document.getElementById('particles');

for(let i=0;i<80;i++){

const p=document.createElement('div');

p.className='particle';

const size=Math.random()*4+1;

p.style.width=size+'px';
p.style.height=size+'px';

p.style.left=Math.random()*100+'%';

p.style.animationDuration=
(10+Math.random()*15)+'s';

p.style.animationDelay=
Math.random()*10+'s';

particles.appendChild(p);

}

</script>

</body>
</html>
